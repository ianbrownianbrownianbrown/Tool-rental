<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoneyDo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <div class="logo">HoneyDo</div>

      <nav>
        <a href="#browse">Browse</a>
        <a href="#list">List a Tool</a>
        <a href="#request">Post a Request</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Grand Rapids tool rentals</p>
          <h1>Rent the tool you need for the weekend.</h1>
          <p>
            HoneyDo helps Grand Rapids homeowners, hobbyists, and weekend DIYers
            rent tools from people nearby.
          </p>

          <div class="search-box">
            <input type="text" placeholder="What tool do you need?" />
            <button>Search</button>
          </div>
        </div>
      </section>

      <section id="browse" class="section">
        <h2>Browse tools near Grand Rapids</h2>

        <div class="categories">
          <button>Power tools</button>
          <button>Ladders</button>
          <button>Lawn & garden</button>
          <button>Painting & drywall</button>
          <button>Moving & hauling</button>
          <button>Specialty</button>
          <button>Auto</button>
        </div>

        <p id="browseStatus" class="status-message" aria-live="polite"></p>
        <div class="tool-grid"></div>
      </section>

      <section id="list" class="section">
        <h2>List your tool</h2>

        <form id="listingForm">
          <input id="toolName" type="text" placeholder="Tool name" />
          <input id="toolCategory" type="text" placeholder="Category" />
          <input id="toolNeighborhood" type="text" placeholder="Neighborhood" />
          <input id="toolDailyPrice" type="text" placeholder="Daily price" />
          <input id="toolWeekendPrice" type="text" placeholder="Weekend price" />
          <input id="ownerName" type="text" placeholder="Your name" />
          <input id="ownerContact" type="text" placeholder="Best contact for renters" />
          <textarea id="toolDescription" placeholder="Describe the tool and what is included"></textarea>
          <button id="previewListingButton" type="button">Preview Listing</button>
        </form>

        <p id="listingStatus" class="status-message" aria-live="polite"></p>
        <div id="listingPreview"></div>
      </section>

      <section id="request" class="section">
        <h2>Post a tool request</h2>

        <form id="requestForm">
          <input id="requestTool" type="text" placeholder="What tool do you need?" />
          <input id="requestDate" type="text" placeholder="When do you need it?" />
          <input id="requestNeighborhood" type="text" placeholder="Neighborhood" />
          <input id="requestBudget" type="text" placeholder="Budget" />
          <textarea id="requestNotes" placeholder="Add any helpful details"></textarea>
          <button id="postRequestButton" type="button">Preview Request</button>
        </form>

        <p id="requestStatus" class="status-message" aria-live="polite"></p>
        <div id="requestPreview"></div>

        <div class="request-board">
          <h3>Open requests</h3>
          <div id="requestList" class="request-list"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
